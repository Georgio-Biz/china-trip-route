<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>China Sourcing Trip</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#ffffff; --bg2:#f5f5f7; --text:#1d1d1f; --text2:#6e6e73; --text3:#86868b;
    --hair:#d2d2d7; --hair2:#e8e8ed; --blue:#0071e3; --flight:#0071e3; --ground:#ff9500;
    --shandong:#2E6FD6; --jiangsu:#8A4FBE; --fujian:#CC7A1F; --guangdong:#3E8E2E;
    --shadow:0 4px 24px rgba(0,0,0,.10); --shadow-sm:0 1px 3px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

  header{padding:13px 22px 11px;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--hair);}
  .h-title{font-size:19px;font-weight:600;letter-spacing:-.012em;color:var(--text)}
  .h-sub{font-size:12.5px;color:var(--text2);margin-top:2px;letter-spacing:-.005em}

  nav{display:flex;justify-content:center;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--hair2)}
  nav{position:relative}
  .seg{-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
  .seg::-webkit-scrollbar{display:none}
  .seg button{scroll-snap-align:start}
  .seg{display:inline-flex;flex-wrap:wrap;justify-content:center;background:var(--hair2);border-radius:10px;padding:3px;gap:2px}
  .tphase{display:flex;gap:14px;margin:0 0 12px;align-items:flex-start}
  .ttag{flex:0 0 auto;min-width:82px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.05em;color:#fff;padding:6px 8px;border-radius:8px;margin-top:2px}
  .tph-bd{flex:1;border:1px solid var(--hair);border-radius:14px;padding:12px 16px;background:#fff;box-shadow:var(--shadow-sm)}
  .tph-hd{font-weight:600;font-size:15px;letter-spacing:-.01em}
  .tph-dt{color:var(--text3);font-weight:600;font-size:12px;margin-left:6px}
  .tph-bd ul{margin:6px 0 0;padding-left:17px}.tph-bd li{font-size:12.5px;margin:5px 0;line-height:1.5}
  .tperson{border-left:4px solid var(--hair)}
  .acc{border:1px solid var(--hair);border-radius:16px;margin:0 0 12px;background:#fff;box-shadow:var(--shadow-sm);overflow:hidden}
  .acc-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
  .acc-hd:hover{background:rgba(0,0,0,.025)}
  .acc-hd .chev{margin-left:auto;color:var(--text3);transition:transform .2s;font-size:12px}
  .acc.open .acc-hd .chev{transform:rotate(90deg)}
  .acc-bd{display:none;padding:4px 16px 16px}
  .acc.open .acc-bd{display:block}
  .acc-nm{font-weight:600;font-size:15.5px;letter-spacing:-.01em}
  .acc-sub{font-size:12px;color:var(--text2);margin-top:1px}
  .gearlist{margin:6px 0 10px;padding-left:17px}.gearlist li{font-size:12.5px;margin:5px 0;line-height:1.45}
  .kv{font-size:12.5px;margin:6px 0;line-height:1.5}.kv b{color:var(--text3);font-weight:600}
  .kv a{color:var(--blue)}
  .sub-h{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;margin:12px 0 6px}
  .ddate{flex:0 0 auto;width:54px;height:48px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;line-height:1}
  .ddate small{font-size:8px;font-weight:600;opacity:.9;text-transform:uppercase;letter-spacing:.02em;margin-top:2px;white-space:nowrap}
  .facblk{border:1px solid var(--hair2);border-radius:12px;padding:10px 13px;margin:0 0 9px;background:var(--bg2)}
  .facblk-hd{font-size:13.5px}.facblk-hd b{font-weight:600}
  .fdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .fcontact{color:var(--text2);font-size:12px}
  .legrow{display:flex;gap:12px;margin:0 0 13px}
  .legrow .ic .badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:#fff;border:1.5px solid var(--hair)}
  .legrow .badge.fl{border-color:var(--flight);color:var(--flight)}
  .legrow .badge.gr{border-color:var(--ground);color:var(--ground)}
  .legbd{flex:1;min-width:0}
  .legseg{font-weight:600;font-size:14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .legseg .dur{font-weight:600;font-size:13px;color:var(--text2);white-space:nowrap}
  .legrow .tn{color:var(--text2);font-size:12.5px;margin-top:3px;line-height:1.5}
  .opttbl{width:100%;border-collapse:collapse;margin:8px 0 0;font-size:12px}
  .opttbl th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text3);font-weight:600;padding:0 8px 4px;border-bottom:1px solid var(--hair2)}
  .opttbl td{padding:5px 8px;border-bottom:1px solid var(--hair2)}
  .opttbl tr:last-child td{border-bottom:0}
  .opttbl .lt{font-weight:600}.opttbl .ld{color:var(--text2)}.opttbl .lsvc{color:var(--text3)}
  .daytip{background:#eff6ee;border:1px solid #cfe6cf;border-radius:10px;padding:9px 12px;font-size:12.5px;margin-top:8px;line-height:1.5}
  .wx{display:inline-block;font-size:12px;font-weight:500;color:#8a5a1a;background:#fff6ec;border:1px solid #f2e2cf;border-radius:8px;padding:5px 11px;margin:2px 0 6px}
  .acc-hd .movebadge{margin-left:auto}
  .chsum{font-size:12.5px;color:var(--text);font-weight:600;margin:4px 0 8px}
  .chtbl{width:100%;border-collapse:collapse;font-size:12px;margin:0 0 6px}
  .chtbl th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text3);font-weight:600;padding:0 8px 5px;border-bottom:1px solid var(--hair)}
  .chtbl td{padding:5px 8px;border-bottom:1px solid var(--hair2);vertical-align:top}
  .chtbl tr:last-child td{border-bottom:0}
  .chtbl .cm{color:var(--text2);font-variant-numeric:tabular-nums;white-space:nowrap}
  .chtbl .cq{color:var(--text2);text-align:center}.chtbl .cp{color:var(--text2);white-space:nowrap}
  .calgrid{display:grid;grid-template-columns:repeat(7,minmax(96px,1fr));gap:6px;margin-top:12px;min-width:700px}
  .caldow{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;text-align:center;padding:2px 0}
  .calcell{min-height:94px;border:1px solid var(--hair2);border-radius:10px;padding:6px 7px;background:#fff}
  .calcell.empty{background:transparent;border:0}
  .calcell .cn{font-size:12px;font-weight:600;color:var(--text3)}
  .calcell.ev{border-color:var(--hair);box-shadow:var(--shadow-sm)}
  .calcell .evt{font-size:10.5px;font-weight:600;color:#fff;border-radius:7px;padding:4px 6px;margin-top:5px;line-height:1.3;cursor:pointer}
  .calcell .evt:hover{filter:brightness(1.05)}
  .calmonth{margin:0 0 8px}
  .calmh{font-size:15px;font-weight:600;letter-spacing:-.01em;margin:20px 0 2px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--text);
    padding:6px 18px;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;letter-spacing:-.01em;transition:all .15s}
  .seg button:hover{color:#000}
  .seg button.active{background:#fff;box-shadow:var(--shadow-sm);font-weight:600}

  #content{flex:1;min-height:0;position:relative}
  .view{position:absolute;inset:0;overflow:auto;display:none;-webkit-overflow-scrolling:touch}
  .view.active{display:block}

  /* MAP */
  #map{position:absolute;inset:0;background:#eef1f4}
  .leaflet-container{background:#eef1f4;font-family:inherit}
  .panel{position:absolute;z-index:500;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);
    border:1px solid rgba(0,0,0,.06);border-radius:14px;box-shadow:var(--shadow)}
  #legend{left:14px;bottom:18px;padding:13px 15px;font-size:12px;max-width:230px}
  #legend h4{margin:0 0 9px;font-size:11px;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;font-weight:600}
  .lg{display:flex;align-items:center;gap:9px;margin:6px 0;color:var(--text)}
  .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .swatch{width:20px;height:0;border-top-width:3px;border-top-style:solid;flex:0 0 auto}
  #stops{right:14px;top:14px;width:264px;max-height:calc(100% - 28px);overflow:auto;padding:6px}
  #stops h4{margin:9px 11px 4px;font-size:11px;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;font-weight:600}
  .stop{display:flex;gap:11px;padding:9px 11px;border-radius:11px;cursor:pointer;align-items:flex-start;transition:background .12s}
  .stop:hover{background:rgba(0,0,0,.045)}
  .daybadge{flex:0 0 auto;width:34px;height:34px;border-radius:9px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;line-height:1}
  .daybadge small{font-size:7.5px;font-weight:600;opacity:.85;letter-spacing:.06em}
  .stop .nm{font-weight:600;font-size:13.5px;letter-spacing:-.01em}
  .stop .mt{font-size:11.5px;color:var(--text2);margin-top:2px}
  .stop .ap{font-size:11px;color:var(--blue);margin-top:3px}
  .toolbtn{position:absolute;z-index:500;left:14px;top:14px;display:flex;gap:7px}
  .toolbtn button{background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(18px);
    border:1px solid rgba(0,0,0,.06);color:var(--text);border-radius:10px;padding:8px 13px;
    font-size:12.5px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-sm)}
  .toolbtn button:hover{background:#fff}

  .leaflet-popup-content-wrapper{background:#fff;color:var(--text);border-radius:14px;box-shadow:var(--shadow)}
  .leaflet-popup-tip{background:#fff}
  .leaflet-popup-content{margin:13px 15px;font-size:13px;line-height:1.5}
  .pp-nm{font-weight:600;font-size:15px;margin-bottom:1px;letter-spacing:-.01em}
  .pp-city{color:var(--text2);font-size:12px;margin-bottom:8px}
  .pp-row{margin:3px 0}.pp-row b{color:var(--text3);font-weight:600}
  .pp-tag{display:inline-block;font-size:10.5px;font-weight:600;color:#fff;padding:2px 8px;border-radius:6px;margin-bottom:7px}
  .prov-label{font-weight:700;font-size:13px;letter-spacing:.02em;white-space:nowrap;
    text-shadow:0 0 3px #fff,0 0 3px #fff,0 1px 2px #fff}
  .pin{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13.5px;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);cursor:pointer;transition:transform .1s}
  .pin:hover{transform:scale(1.18)}
  .pin.opt{opacity:.9;font-size:16px;font-weight:600}
  .leaflet-tooltip.rich-tip{background:#fff;color:var(--text);border:1px solid rgba(0,0,0,.08);border-radius:13px;
    box-shadow:0 8px 30px rgba(0,0,0,.18);padding:12px 14px;width:250px;white-space:normal;
    font-size:12.5px;line-height:1.5;font-family:inherit}
  .leaflet-tooltip.rich-tip::before{display:none}

  /* CONTENT PAGES */
  .wrap{max-width:920px;margin:0 auto;padding:34px 22px 70px}
  h2{font-weight:700;letter-spacing:-.02em;margin:0 0 5px;font-size:30px}
  .lead{color:var(--text2);margin:0 0 26px;font-size:15px;line-height:1.5}
  .day{border:1px solid var(--hair);border-radius:18px;margin:0 0 14px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)}
  .day-hd{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--bg2)}
  .day-hd .n{width:42px;height:42px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;color:#fff;line-height:1}
  .day-hd .n small{font-size:8px;font-weight:600;opacity:.85;letter-spacing:.06em}
  .day-hd .rg{font-weight:600;font-size:16px;letter-spacing:-.01em}
  .day-hd .dt{color:var(--text2);font-size:12.5px;margin-top:1px}
  .day-bd{padding:6px 18px 15px}
  .leg{display:flex;gap:14px;padding:11px 0;border-top:1px solid var(--hair2)}
  .leg:first-child{border-top:0}
  .leg .slot{flex:0 0 120px;color:var(--text3);font-size:12px;font-weight:600;padding-top:1px}
  .leg .who{font-weight:600;font-size:14.5px;letter-spacing:-.01em}
  .leg .buy{color:var(--text2);font-size:13px;margin-top:2px}
  .note{color:var(--text2);font-size:12.5px;margin-top:9px;line-height:1.5}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
  .card{border:1px solid var(--hair);border-radius:18px;padding:17px 18px;background:#fff;box-shadow:var(--shadow-sm)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card .nm{font-weight:600;font-size:16px;letter-spacing:-.01em}
  .card .ct{color:var(--text2);font-size:12px;margin-top:1px}
  .card .meta{margin-top:11px;font-size:12.5px;line-height:1.7;color:var(--text)}
  .card .meta b{color:var(--text3);font-weight:600}
  .chip{font-size:10.5px;font-weight:600;color:#fff;padding:3px 9px;border-radius:7px;white-space:nowrap}
  .movebadge{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;text-align:right}
  .movebadge b{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .movebadge small{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .jtbl{width:100%;border-collapse:collapse;font-size:13px;margin:0 0 8px}
  .jtbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;padding:0 10px 8px;border-bottom:1px solid var(--hair)}
  .jtbl td{padding:10px;border-bottom:1px solid var(--hair2);vertical-align:top}
  .jtbl tr:last-child td{border-bottom:0}
  .jtbl td:first-child{font-weight:600}
  .qwrap{margin:6px 0 2px}
  .qbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:0 0 11px;position:sticky;top:0;background:var(--card);padding:4px 0;z-index:2}
  .qbtn{font:inherit;font-size:11.5px;font-weight:600;padding:6px 11px;border:1px solid #0071e3;color:#0071e3;background:transparent;border-radius:8px;cursor:pointer;-webkit-appearance:none}
  .qbtn:active{background:rgba(0,113,227,.09)}
  .qbtn.qclr{border-color:var(--line2);color:var(--text3)}
  .qsaved{font-size:11.5px;font-weight:600;color:#0a8a3c;opacity:0;transition:opacity .15s}
  .qsaved.on{opacity:1}
  .qgrp{border:1px solid var(--line);border-radius:11px;margin:0 0 9px;overflow:hidden;background:var(--card)}
  .qgh{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;background:var(--bg2)}
  .qgt{font-size:12.5px;font-weight:700;flex:1;min-width:0}
  .qgs{font-size:11.5px;color:var(--text3);font-weight:600;white-space:nowrap}
  .qgc{font-size:10px;color:var(--text3);transition:transform .18s}
  .qgrp.open .qgc{transform:rotate(180deg)}
  .qgb{display:none;padding:2px 10px 8px}
  .qgrp.open .qgb{display:block}
  .qrow{padding:10px 0;border-bottom:1px solid var(--line)}
  .qrow:last-child{border-bottom:none}
  .qname{display:flex;align-items:baseline;gap:8px;margin:0 0 7px}
  .qname b{font-size:12.5px;font-weight:600;flex:1;min-width:0}
  .qqty{font-size:11px;color:var(--text3);white-space:nowrap;font-weight:600}
  .qcells{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:6px}
  .qc{background:var(--bg2);border-radius:8px;padding:6px 8px;min-width:0}
  .qc small{display:block;font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;font-weight:600;margin-bottom:2px}
  .qc span{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .qc .tg{color:#0071e3}
  .qc.ag{background:rgba(0,113,227,.07);border:1px solid rgba(0,113,227,.22)}
  .qc .atot.on{color:#0a8a3c}
  input.agr{width:100%;padding:3px 0;font:inherit;font-size:13px;font-weight:700;border:none;background:transparent;color:var(--text);-webkit-appearance:none;font-variant-numeric:tabular-nums}
  input.agr:focus{outline:none;color:#0071e3}
  .qtot{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:7px;margin-top:11px;padding-top:11px;border-top:2px solid var(--line)}
  .qtl{background:var(--bg2);border-radius:9px;padding:8px 10px}
  .qtl.wide{grid-column:1/-1}
  .qtl small{display:block;font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;font-weight:600;margin-bottom:2px}
  .qtl b{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
  .qtl b.tg{color:#0071e3}
  .qtl b.ok{color:#0a8a3c}
  .qhint{display:block;font-size:10.5px;color:var(--text3);font-weight:500;margin-top:3px;line-height:1.4;text-transform:none;letter-spacing:0}
  .ptwrap{margin:6px 0 4px}
  .ptnote{font-size:12px;color:var(--text3);margin:0 0 8px;line-height:1.5}
  .ptbl{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed}
  .ptbl th{text-align:right;font-weight:600;color:var(--text3);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:0 6px 6px;border-bottom:1px solid var(--line)}
  .ptbl th:first-child{text-align:left}
  .ptbl td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}
  .ptbl td.pi{text-align:left;width:38%}
  .ptbl td.pi b{display:block;font-weight:600;font-size:12.5px}
  .ptbl td.pi small{display:block;color:var(--text3);font-size:10.5px;margin-top:1px;line-height:1.35}
  .ptbl td.pq{color:var(--text2)}
  .ptbl td.pt{color:#0071e3;font-weight:600}
  .ptbl td.pd{color:#c77700;font-size:11.5px}
  .ptbl td.pa{width:78px}
  .ptbl tfoot td{border-bottom:none;border-top:2px solid var(--line);font-weight:700;padding-top:9px}
  .shbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:0 0 9px}
  .shbtn{font:inherit;font-size:11.5px;font-weight:600;padding:6px 11px;border:1px solid #0071e3;color:#0071e3;background:transparent;border-radius:8px;cursor:pointer}
  .shbtn:active{background:rgba(0,113,227,.08)}
  .shmsg{font-size:11.5px;color:#0a8a3c;font-weight:600}
  input.agr{width:72px;padding:5px 6px;font:inherit;font-size:12px;text-align:right;border:1px dashed var(--line2);border-radius:7px;background:var(--card);color:var(--text);-webkit-appearance:none}
  input.agr:focus{outline:none;border:1px solid #0071e3;background:#fff}
  .agrtot{color:#0a8a3c}
  .shots{display:grid;grid-template-columns:1fr;gap:14px}
  .shot{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
  .shot img{width:100%;display:block}
  .shot .cap{padding:10px 13px;font-size:12.5px;color:var(--text2);line-height:1.5}
  .shot .cap b{color:var(--text);display:block;margin-bottom:2px;font-size:13px}
  .jgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:0 0 10px}
  .jcard{background:var(--bg2);border-radius:16px;padding:16px 18px}
  .jcard h4{margin:0 0 8px;font-size:14px;font-weight:600}
  .jcard ul{margin:0;padding-left:17px}.jcard li{font-size:12.5px;margin:6px 0;line-height:1.5}
  .jcard .big{font-weight:600;font-size:14.5px;margin-top:3px}
  .intlgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0 0 12px}

const AK  = (nm,item)=>'fitaz.agr.v2|'+nm+'|'+item;
const f2  = n => n==null?'—':'$'+Number(n).toFixed(2);
const f0  = n => n==null?'—':'$'+Math.round(n).toLocaleString();
const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function agrGet(nm,item){ try{ return localStorage.getItem(AK(nm,item))||''; }catch(e){ return ''; } }
function agrSet(nm,item,v){ try{ v?localStorage.setItem(AK(nm,item),v):localStorage.removeItem(AK(nm,item)); }catch(e){} }

function quoteBlock(nm){
  const Q=QUOTE[nm]; if(!Q) return '';
  let ri=0, h=`<div class="qwrap" data-sup="${esc(nm)}">`;
  h+=`<div class="qbar"><button type="button" class="qbtn" data-act="csv" data-sup="${esc(nm)}">Export CSV</button>`+
     `<button type="button" class="qbtn" data-act="link" data-sup="${esc(nm)}">Copy share link</button>`+
     `<button type="button" class="qbtn qclr" data-act="clear" data-sup="${esc(nm)}">Clear</button>`+
     `<span class="qsaved" data-saved="${esc(nm)}"></span></div>`;
  Q.groups.forEach((g,gi)=>{
    h+=`<div class="qgrp open"><div class="qgh" data-gi="${gi}"><span class="qgt">${esc(g.g)}</span><span class="qgs" data-gsub="${gi}">—</span><span class="qgc">▾</span></div><div class="qgb">`;
    g.rows.forEach(r=>{
      const item=r[0], qty=r[1], quo=r[2], tar=r[3];
      h+=`<div class="qrow"><div class="qname"><b>${esc(item)}</b><span class="qqty">× ${qty} ${esc(g.u)}</span></div>`+
        `<div class="qcells">`+
        `<div class="qc"><small>Quoted / ${esc(g.u)}</small><span>${f2(quo)}</span></div>`+
        `<div class="qc"><small>Target / ${esc(g.u)}</small><span class="tg">${f2(tar)}</span></div>`+
        `<div class="qc"><small>Quoted total</small><span>${quo!=null?f0(quo*qty):'—'}</span></div>`+
        `<div class="qc ag"><small>Agreed / ${esc(g.u)}</small>`+
          `<input class="agr" inputmode="decimal" placeholder="0.00" data-ri="${ri}" data-nm="${esc(nm)}" data-item="${esc(item)}" data-qty="${qty}" data-gi="${gi}" value="${esc(agrGet(nm,item))}"></div>`+
        `<div class="qc"><small>Agreed total</small><span class="atot" data-atot="${ri}">—</span></div>`+
        `</div></div>`;
      ri++;
    });
    h+=`</div></div>`;
  });
  h+=`<div class="qtot" data-tot="${esc(nm)}"></div></div>`;
  return h;
}

function quoteRecalc(nm){
  const Q=QUOTE[nm], wrap=document.querySelector(`.qwrap[data-sup="${nm}"]`); if(!Q||!wrap) return;
  let TQ=0,TT=0,TA=0,TQp=0,filled=0,total=0;
  Q.groups.forEach((g,gi)=>{
    let gq=0,ga=0;
    g.rows.forEach(r=>{
      const qty=r[1],quo=r[2],tar=r[3];
      if(quo!=null){gq+=quo*qty;TQ+=quo*qty;}
      if(tar!=null){TT+=tar*qty;}
    });
    wrap.querySelectorAll(`input.agr[data-gi="${gi}"]`).forEach(inp=>{
      const v=parseFloat(String(inp.value).replace(/[^0-9.]/g,''));
      const qty=parseFloat(inp.dataset.qty)||0;
      const ridx=parseInt(inp.dataset.ri,10);
      const cell=wrap.querySelector(`.atot[data-atot="${inp.dataset.ri}"]`);
      if(!isNaN(v)&&v>0){
        const t=v*qty; ga+=t; TA+=t; filled++;
        const row=g.rows.find(x=>x[0]===inp.dataset.item);
        if(row&&row[2]!=null) TQp+=row[2]*qty;
        if(cell){cell.textContent=f0(t);cell.classList.add('on');}
      }
      else { if(cell){cell.textContent='—';cell.classList.remove('on');} }
    });
    total+=g.rows.length;
    const sub=wrap.querySelector(`.qgs[data-gsub="${gi}"]`);
    if(sub) sub.textContent = ga>0 ? f0(ga)+' agreed' : f0(gq);
  });
  const t=wrap.querySelector(`.qtot[data-tot="${nm}"]`);
  if(t) t.innerHTML =
    `<div class="qtl"><small>Quoted total</small><b>${f0(TQ)}</b></div>`+
    `<div class="qtl"><small>Target total</small><b class="tg">${f0(TT)}</b></div>`+
    `<div class="qtl"><small>Agreed total</small><b class="${TA>0?'ok':''}">${TA>0?f0(TA):'—'}</b></div>`+
    `<div class="qtl"><small>vs quoted (priced lines)</small><b class="${TA>0&&TA<TQp?'ok':''}">${TA>0?(TA<=TQp?'−$':'+$')+Math.round(Math.abs(TQp-TA)).toLocaleString():'—'}</b></div>`+
    `<div class="qtl wide"><small>Lines priced</small><b>${filled} of ${total}</b>${filled<total?`<span class="qhint">Agreed total only covers the ${filled} line${filled===1?'':'s'} you've filled in — not the whole order.</span>`:''}</div>`;
}

function quoteFlash(nm,msg){
  const el=document.querySelector(`.qsaved[data-saved="${nm}"]`); if(!el) return;
  el.textContent=msg||'Saved'; el.classList.add('on');
  clearTimeout(el._t); el._t=setTimeout(()=>{el.classList.remove('on');el.textContent='';},1600);
}

function quoteWire(){
  document.querySelectorAll('input.agr').forEach(inp=>{
    const save=()=>{ agrSet(inp.dataset.nm,inp.dataset.item,inp.value.trim()); quoteRecalc(inp.dataset.nm); quoteFlash(inp.dataset.nm,'Saved'); };
    ['input','change','blur'].forEach(ev=>inp.addEventListener(ev,save));
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } });
  });
  document.querySelectorAll('.qgh').forEach(hd=>hd.addEventListener('click',e=>{ e.stopPropagation(); hd.parentElement.classList.toggle('open'); }));
  document.querySelectorAll('.qbtn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const nm=b.dataset.sup, act=b.dataset.act, Q=QUOTE[nm];
    if(act==='clear'){
      if(!confirm('Clear all agreed prices for '+nm+'?')) return;
      Q.groups.forEach(g=>g.rows.forEach(r=>agrSet(nm,r[0],'')));
      document.querySelectorAll(`input.agr[data-nm="${nm}"]`).forEach(i=>i.value='');
      quoteRecalc(nm); quoteFlash(nm,'Cleared'); return;
    }
    if(act==='link'){
      const d={}; Q.groups.forEach(g=>g.rows.forEach(r=>{const v=agrGet(nm,r[0]); if(v) d[r[0]]=v;}));
      const enc=btoa(unescape(encodeURIComponent(JSON.stringify(d)))).replace(/\+/g,'-').replace(/\//g,'_');
      const url=location.origin+location.pathname+'?agreed='+enc;
      if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(()=>quoteFlash(nm,'Link copied')).catch(()=>prompt('Copy:',url));
      else prompt('Copy:',url);
      return;
    }
    if(act==='csv'){
      const rows=[['Group','Item','Qty','Unit','Quoted per '+'piece','Target per piece','Quoted total','Agreed per piece','Agreed total']];
      Q.groups.forEach(g=>g.rows.forEach(r=>{
        const v=parseFloat(agrGet(nm,r[0]))||'';
        rows.push([g.g,r[0],r[1],g.u,r[2]??'',r[3]??'',r[2]!=null?(r[2]*r[1]).toFixed(2):'',v===''?'':v,v===''?'':(v*r[1]).toFixed(2)]);
      }));
      const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
      a.download=nm.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-agreed-prices.csv';
      document.body.appendChild(a); a.click(); a.remove();
      quoteFlash(nm,'CSV exported');
    }
  }));
  // restore from a shared link
  try{
    const p=new URLSearchParams(location.search).get('agreed');
    if(p){
      const d=JSON.parse(decodeURIComponent(escape(atob(p.replace(/-/g,'+').replace(/_/g,'/')))));
      Object.keys(QUOTE).forEach(nm=>{
        Object.entries(d).forEach(([item,v])=>{
          agrSet(nm,item,v);
          const i=document.querySelector(`input.agr[data-nm="${nm}"][data-item="${CSS.escape?CSS.escape(item):item}"]`);
          if(i) i.value=v;
        });
      });
      document.querySelectorAll('input.agr').forEach(i=>{ const v=agrGet(i.dataset.nm,i.dataset.item); if(v) i.value=v; });
    }
  }catch(e){ console.warn('agreed restore failed',e); }
  Object.keys(QUOTE).forEach(quoteRecalc);
}

fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
 .then(r=>r.json())
 .then(gj=>{
   const trip = {};
   Object.values(REGIONS).forEach(r=>trip[r.adcode]=r);
   const layer = L.geoJSON(gj,{
     style:f=>{
       const t = trip[f.properties.adcode];
       return t ? {color:t.color,weight:1.5,opacity:.95,fillColor:t.color,fillOpacity:.14}
                : {color:'#b9bcc4',weight:.6,opacity:.7,fillColor:'#000',fillOpacity:0};
     },
     onEachFeature:(f,l)=>{ l.bindTooltip(f.properties.name,{sticky:true,direction:'top'}); }
   }).addTo(map);
   layer.bringToBack();
   Object.values(REGIONS).forEach(r=>{
     L.marker([r.center[1],r.center[0]],{interactive:false,
       icon:L.divIcon({className:'',html:`<div class="prov-label" style="color:${r.color}">${r.name}</div>`,iconSize:[120,18]})
     }).addTo(map);
   });
 })
 .catch(()=>{});

  const ground = s.mode==='ground';

    color: ground ? '#ff9500' : '#0071e3',

    dashArray: ground ? null : '3,7'
  }).addTo(map).bindTooltip(s.label,{sticky:true});
});

function detailHTML(s){
  const col = REGIONS[s.region].color;
  const tag = `<span class="pp-tag" style="background:${col}">${REGIONS[s.region].name}</span>`;
  return `${tag}<div class="pp-nm">${s.nm}</div><div class="pp-city">${TRADE[s.nm]||s.city}</div>`+
    (MEET[s.nm]?`<div class="pp-row"><b>Meeting:</b> ${MEET[s.nm]}</div>`:'')+
    (CONTACT[s.nm]?`<div class="pp-row"><b>Contact:</b> ${CONTACT[s.nm]}</div>`:'')+
    `<div class="pp-row"><b>Makes:</b> ${s.cat}</div>`+
    (ADDR[s.nm]?`<div class="pp-row"><b>Address:</b> ${ADDR[s.nm]}</div>`:'')+
    (ARRIVE[s.nm]?`<div class="pp-row"><b>Getting there:</b> ${ARRIVE[s.nm]}</div>`:'')+
    (NEXTSTOP[s.nm]?`<div class="pp-row"><b>Then:</b> ${NEXTSTOP[s.nm]}</div>`:'')+
    catRow(s.nm)+
    `<div class="pp-row"><b>Nearest airport:</b> ${s.ap}${HSR[s.nm]?` · <b>HSR:</b> ${HSR[s.nm]}`:''}</div>`;
}
SUPPLIERS.forEach(s=>{
  const col = REGIONS[s.region].color;
  const visited = s.day>0;
  const icon = L.divIcon({className:'', iconSize:[28,28], iconAnchor:[14,14],
    html:`<div class="pin${visited?'':' opt'}" style="background:${col}">${visited?s.day:'+'}</div>`});
  const m = L.marker(s.ll,{icon}).addTo(map);
  const html = detailHTML(s);
  m.bindTooltip(html,{direction:'top',offset:[0,-14],className:'rich-tip',sticky:false});
  m.bindPopup(html,{maxWidth:280});
  markerByName[s.nm]=m;
  allPts.push(s.ll);
});

const stopBounds = L.latLngBounds(allPts).pad(.12);
document.getElementById('fitStops').onclick=()=>map.flyToBounds(stopBounds,{duration:.6});
document.getElementById('fitChina').onclick=()=>map.flyTo([31,110],4,{duration:.6});

/* side panel */
const stopsEl = document.getElementById('stops');
let html = '<h4>Trip stops</h4>';
SUPPLIERS.filter(s=>s.day>0).sort((a,b)=>((a.mon==='AUG'?40:0)+a.day)-((b.mon==='AUG'?40:0)+b.day)).forEach(s=>{
  const col = REGIONS[s.region].color;
  const dlabel = s.slot.includes('AM')?'AM':s.slot.includes('PM')?'PM':'';
  html += `<div class="stop" data-nm="${s.nm}">
    <div class="daybadge" style="background:${col}"><small>${s.mon||'JUL'}</small>${s.day}</div>
    <div><div class="nm">${s.nm}</div><div class="mt">${s.city}${dlabel?' · '+dlabel:''}</div>
    <div class="ap">✈ ${s.ap}</div></div></div>`;
});
stopsEl.innerHTML = html;
stopsEl.querySelectorAll('.stop').forEach(el=>{
  el.onclick=()=>{const m=markerByName[el.dataset.nm]; map.flyTo(m.getLatLng(),9,{duration:.6}); m.openPopup();};
});

const iconFor = m => m==='fly'?'✈':(m==='car'?'🚗':'🚄');
const facBlock = nm => {
  const s = SUPPLIERS.find(x=>x.nm===nm); if(!s) return '';
  const col = REGIONS[s.region].color;
  return `<div class="facblk"><div class="facblk-hd"><span class="fdot" style="background:${col}"></span><b>${nm}</b>`+
    (MEET[nm]?`<span class="fcontact"> · ${MEET[nm]}</span>`:'')+
    (CONTACT[nm]&&CONTACT[nm]!=='TBC'?`<span class="fcontact"> · ${CONTACT[nm]}</span>`:'')+
    `</div></div>`;
};
const legBlock = l => {
  const opts = (l.opts||[]).map(o=>`<tr><td class="lt">${o.t}</td><td class="ld">${o.d}</td><td class="lsvc">${o.svc||''}</td></tr>`).join('');
  return `<div class="legrow"><div class="ic"><div class="badge ${l.mode==='fly'?'fl':'gr'}">${iconFor(l.mode)}</div></div>`+
    `<div class="legbd"><div class="legseg">${l.route}<span class="dur">${l.dur}</span></div>`+
    (l.note?`<div class="tn">${l.note}</div>`:'')+
    (opts?`<table class="opttbl"><thead><tr><th>Departs</th><th>Duration</th><th>Service</th></tr></thead><tbody>${opts}</tbody></table>`:'')+
    `</div></div>`;
};

(function(){

  const ev={}; DAYS.forEach(d=>{ ev[d.mon+parseInt(d.dnum,10)]=d; });

  const monthGrid=(mIdx,label)=>{
    const startDow=new Date(2026,mIdx,1).getDay(); const dim=new Date(2026,mIdx+1,0).getDate();
    let cells='';
    for(let i=0;i<startDow;i++) cells+='<div class="calcell empty"></div>';
    for(let d=1;d<=dim;d++){ const e=ev[label+d]; const col=e?REGIONS[e.region].color:'';
      cells+=`<div class="calcell${e?' ev':''}"><div class="cn">${d}</div>${e?`<div class="evt" data-m="${label}" data-d="${d}" style="background:${col}">${e.title}</div>`:''}</div>`; }
    return `<div class="calmonth"><div class="calmh">${label==='Jul'?'July':'August'} 2026</div><div style="overflow-x:auto"><div class="calgrid">`+
      dows.map(x=>`<div class="caldow">${x}</div>`).join('')+cells+`</div></div></div>`;
  };
  cal.innerHTML='<h2>Calendar</h2><p class="lead">The whole trip on a calendar — for Daniel. Tap a coloured day to jump to it in the Itinerary.</p>'+
   '<div class="tsum">'+
    '<div class="box"><div class="lab">Total window</div><div class="val">14 days <small>23 Jul – 5 Aug</small></div></div>'+

   '</div>'+
   monthGrid(6,'Jul')+monthGrid(7,'Aug');
  cal.querySelectorAll('.evt').forEach(el=>el.onclick=()=>{
    [...document.querySelectorAll('.seg button')].find(b=>b.dataset.view==='itinerary').click();
    const dn=String(el.dataset.d).padStart(2,'0'), mo=el.dataset.m;
    const acc=[...document.querySelectorAll('#itin .acc')].find(a=>{const dd=a.querySelector('.ddate');return dd&&dd.textContent.trim().startsWith(dn)&&dd.textContent.includes(mo);});

   '<div class="jcard"><h4>Getting around</h4><ul><li>Didi (rides; also inside Alipay/WeChat)</li><li>Amap or Baidu Maps (Google Maps is poor in China)</li><li>Translator: Google Translate offline pack, or Pleco</li></ul></div>'+
   '<div class="jcard"><h4>Documents</h4><ul><li>Australians: 30-day visa-free mainland (to end-2026); HK separate 90-day</li><li>Passport valid 6+ months</li><li>Save photos of passport + tickets offline</li></ul></div>'+
 '</div>'+
 '<div class="h3">City guide — everywhere the trip touches</div><div class="jgrid">'+
   '<div class="jcard"><h4>Shanghai 上海 · 23–26 Jul</h4><ul><li>China’s biggest city — ~25 million people</li><li>World’s busiest container port every year since 2010</li><li>The name means “upon the sea”</li><li>The Bund’s 1920s bank facades stare across at Pudong — a skyline built almost entirely since 1990</li><li>Shanghai Tower: 632 m, with lifts hitting ~74 km/h</li><li>The airport Maglev tops 431 km/h — world’s fastest commercial train</li><li>World’s longest metro network (~830 km)</li><li>Plane-tree streets of the old French Concession (1849–1943)</li><li>The Communist Party held its first congress here in 1921 (Xintiandi)</li><li>Order xiaolongbao — soup dumplings are the local flex</li></ul></div>'+
   '<div class="jcard"><h4>Nantong 南通 · 24 Jul</h4><ul><li>“North gate of the Yangtze” — where the river meets the Yellow Sea</li><li>~7.7 million people, directly across the river from Shanghai</li><li>Industrialist Zhang Jian made it “China’s first modern city” — he founded China’s first museum here (1905)</li><li>Home-textile capital: a huge share of China’s bedding/fabric trades through its markets</li><li>Famous longevity belt — Rugao county has an unusual number of centenarians</li><li>The 11 km Shanghai–Nantong Yangtze bridge (2020) cut the trip to about an hour</li><li>Baopeng’s free-weights factory sits out east in Rudong county</li><li>Traditional blue calico (dyed cloth) craft town</li><li>Port moves 300+ million tonnes a year</li><li>River crab + Haimen goat are the local dishes</li></ul></div>'+
   '<div class="jcard"><h4>Dezhou &amp; Ningjin 德州·宁津 · 26–28 Jul</h4><ul><li>~5.6 million people on the North China Plain</li><li><b>Ningjin county is China’s fitness-equipment capital</b> — locals claim ~70% of the country’s commercial gym gear starts here (hence Rosen + MBH)</li><li>Dezhou braised chicken (扒鸡) is nationally famous — grab it vacuum-packed at the station</li><li>“Solar Valley” — hosted the 2010 International Solar City Congress; solar water heaters everywhere</li><li>Grew rich on the Grand Canal grain trade for six centuries</li><li>Sits on the Beijing–Shanghai artery — 1 h to Jinan, ~4 h to Shanghai by HSR</li><li>A Sulu (Philippines) sultan died visiting in 1417 — his tomb is still here</li><li>Ningjin also builds classical furniture and piano parts</li><li>Flat wheat-and-corn country; 40°C summer days happen</li><li>Dezhou watermelons are the summer staple</li></ul></div>'+
   '<div class="jcard"><h4>Linyi &amp; Yishui 临沂·沂水 · 28 Jul</h4><ul><li>Linyi prefecture: ~11 million people — one of Shandong’s biggest</li><li>“Logistics capital of China” — its wholesale markets rank among the world’s largest</li><li>Yishui county: ~1 million people across 2,414 km² of the Yimeng Mountains</li><li>The Yishui Underground Grand Canyon is a 6.1 km cave with China’s best underground river ride</li><li>Both names come from the Yi River</li><li>The Yimeng hills were a famous revolutionary base area in the 1940s</li><li>Cheap land + Linyi logistics = a big flooring / rubber-products belt</li><li>Wang Xizhi, China’s greatest calligrapher (4th century), was born in Linyi</li><li>Nearby Changlin produced China’s biggest gem diamond find (158 carats)</li><li>Yishui GDP ≈ ¥62 bn (2024) — manufacturing + agri processing</li></ul></div>'+
   '<div class="jcard"><h4>Rizhao 日照 · 28 Jul</h4><ul><li>The name means “first to be lit by sunshine”</li><li>~3 million people, coastal prefecture south of Qingdao</li><li>Rizhao Port is a top-10 Chinese bulk port (iron ore + soybeans)</li><li>China’s northernmost commercial green-tea country</li><li>64 km of golden beaches — a domestic summer escape</li><li>Big sailing + watersports base (hosted National Games sailing)</li><li>Relax Sports sits in the Economic Development Zone</li><li>Steel and pulp mills anchor the industrial economy</li><li>Liangchengzhen nearby: a 4,000-year-old Longshan black-pottery site</li><li>The beachfront seafood BBQ (烧烤) scene is the evening move</li></ul></div>'+
   '<div class="jcard"><h4>Qingdao 青岛 · 28–30 Jul</h4><ul><li>~10 million people — Shandong’s showcase coastal city</li><li>Tsingtao Brewery, founded 1903 under German rule, is China’s export beer</li><li>The old German quarter (1898–1914): red roofs, St Michael’s Cathedral</li><li>Locals genuinely buy draft beer in plastic bags from street kegs</li><li>2008 Olympic sailing city — huge marina at Fushan Bay</li><li>Haier and Hisense are both headquartered here</li><li>The 26 km Jiaozhou Bay bridge is among the world’s longest sea crossings</li><li>Top-5 world container port</li><li>Your factories (Quick Body, Peach Builder) sit in the Chengyang/Jimo manufacturing belt up north</li><li>May Fourth Square’s red spiral marks the 1919 movement sparked partly over Qingdao’s fate</li></ul></div>'+
   '<div class="jcard"><h4>Xiamen &amp; Zhangzhou 厦门·漳州 · 30 Jul</h4><ul><li>Xiamen (“Amoy”): ~5.3 million — one of China’s original four Special Economic Zones (1980)</li><li>Gulangyu Island: UNESCO-listed, car-free, nicknamed Piano Island</li><li>Taiwan’s Kinmen island sits ~10 km offshore</li><li>Heart of Hokkien culture — ancestral home of much of Southeast Asia’s Chinese diaspora</li><li>Xiamen University is rated China’s most beautiful campus</li><li>Oolong tea country — Tieguanyin grows next door in Anxi</li><li>Zhangzhou (~5 million) is the food + flower belt; Changtai district does metal fabrication — that’s Rayton</li><li>The Island Ring Road is one of China’s prettiest coastal drives</li><li>Local dare: 土笋冻 — sea-worm jelly. Braver than it sounds</li><li>Hosted the 2017 BRICS summit</li></ul></div>'+
   '<div class="jcard"><h4>Guangzhou 广州 · 30 Jul–2 Aug</h4><ul><li>~19 million people — core of the world’s largest urban region (the Greater Bay Area, ~86 m)</li><li>2,200+ years old — “Canton”, the start of the Maritime Silk Road</li><li>Hosts the Canton Fair, China’s biggest trade show, since 1957</li><li>Ground zero of Cantonese food — dim sum / yum cha started here</li><li>Canton Tower: 604 m with a ferris wheel on the roof</li><li>Baiyun is regularly among the world’s busiest airports</li><li>From 1757–1842 this was the ONLY Chinese port open to the West</li><li>Huadu district (Conlin) = machinery belt; Shunde next door (OMA) is China’s appliance capital</li><li>A Pearl River night cruise is the best cheap evening out</li><li>August = daily thunderstorm burst; carry a brolly</li></ul></div>'+
   '<div class="jcard"><h4>Dongguan 东莞 · 1 Aug</h4><ul><li>~10.5 million people wedged between Guangzhou and Shenzhen</li><li>The original “world’s factory” — at its peak it made roughly 1 in 5 smartphones on earth</li><li>32 manufacturing towns, each with a specialty — Chashan (Chuanyu) is one</li><li>Huawei’s European-style Songshan Lake campus is here</li><li>Humen 1839: Lin Zexu destroyed British opium here — the spark for the Opium War</li><li>Humen station puts Hong Kong ~40 min away by HSR</li><li>China’s basketball town — the CBA’s most successful club</li><li>Once ~75% of residents were migrants from other provinces</li><li>Now pivoting into robotics and EV parts</li><li>Order the roast goose</li></ul></div>'+
   '<div class="jcard"><h4>Hong Kong 香港 · 2–5 Aug</h4><ul><li>7.5 million people; separate currency, law + immigration as an SAR</li><li>More skyscrapers than any city on earth</li><li>The Peak Tram has been climbing Victoria Peak since 1888</li><li>The MTR runs ~99.9% on time — and turns a profit</li><li>Octopus (1997) was the world’s first big contactless transit card</li><li>Star Ferry has crossed the harbour since 1888 — still a few HK dollars</li><li>HKD has been pegged to the USD since 1983</li><li>The airport sits on a flattened island (Chek Lap Kok, 1998)</li><li>Big Buddha at Ngong Ping: 34 m of bronze, cable car up</li><li>Eat: dim sum, roast goose, pineapple buns, egg tarts</li></ul></div>'+
 '</div>'+
