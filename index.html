<!doctype html>
<html lang="en">

<title>China Trip — Route &amp; Airports</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#fff;--bg2:#f5f5f7;--text:#1d1d1f;--text2:#6e6e73;--text3:#86868b;
    --hair:#d2d2d7;--hair2:#e8e8ed;--blue:#0071e3;--flight:#0071e3;--ground:#ff9500;
    --shandong:#2E6FD6;--jiangsu:#8A4FBE;--fujian:#CC7A1F;--guangdong:#3E8E2E;
    --shadow:0 4px 24px rgba(0,0,0,.10);--shadow-sm:0 1px 3px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{padding:13px 22px 11px;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hair)}
  .h-title{font-size:19px;font-weight:600;letter-spacing:-.012em}
  .h-sub{font-size:12.5px;color:var(--text2);margin-top:2px}
  nav{display:flex;justify-content:center;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--hair2)}
  .seg{display:inline-flex;background:var(--hair2);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap;justify-content:center}
  .seg button{appearance:none;border:0;background:transparent;color:var(--text);padding:6px 16px;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .15s}
  .seg button.active{background:#fff;box-shadow:var(--shadow-sm);font-weight:600}
  #content{flex:1;min-height:0;position:relative}
  .view{position:absolute;inset:0;overflow:auto;display:none}
  .view.active{display:block}
  #map{position:absolute;inset:0;background:#eef1f4}
  .leaflet-container{background:#eef1f4;font-family:inherit}
  .panel{position:absolute;z-index:500;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);border:1px solid rgba(0,0,0,.06);border-radius:14px;box-shadow:var(--shadow)}
  #legend{left:14px;bottom:18px;padding:13px 15px;font-size:12px;max-width:230px}
  #legend h4{margin:0 0 9px;font-size:11px;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;font-weight:600}
  .lg{display:flex;align-items:center;gap:9px;margin:6px 0}
  .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .swatch{width:20px;height:0;border-top-width:3px;border-top-style:solid;flex:0 0 auto}
  #stops{right:14px;top:14px;width:250px;max-height:calc(100% - 28px);overflow:auto;padding:6px}
  #stops h4{margin:9px 11px 4px;font-size:11px;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;font-weight:600}
  .stop{display:flex;gap:11px;padding:9px 11px;border-radius:11px;cursor:pointer;align-items:flex-start}
  .stop:hover{background:rgba(0,0,0,.045)}
  .daybadge{flex:0 0 auto;width:34px;height:34px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;line-height:1}
  .daybadge small{font-size:7.5px;font-weight:600;opacity:.85}
  .stop .nm{font-weight:600;font-size:13.5px}
  .stop .mt{font-size:11.5px;color:var(--text2);margin-top:2px}
  .stop .ap{font-size:11px;color:var(--blue);margin-top:3px}
  .toolbtn{position:absolute;z-index:500;left:14px;top:14px;display:flex;gap:7px}
  .toolbtn button{background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(18px);border:1px solid rgba(0,0,0,.06);color:var(--text);border-radius:10px;padding:8px 13px;font-size:12.5px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-sm)}
  .pin{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13.5px;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);cursor:pointer;transition:transform .1s}
  .pin:hover{transform:scale(1.18)}
  .pin.opt{opacity:.9;font-size:16px;font-weight:600}
  .leaflet-tooltip.rich-tip{background:#fff;color:var(--text);border:1px solid rgba(0,0,0,.08);border-radius:13px;box-shadow:0 8px 30px rgba(0,0,0,.18);padding:12px 14px;width:250px;white-space:normal;font-size:12.5px;line-height:1.5;font-family:inherit}
  .leaflet-tooltip.rich-tip::before{display:none}
  .pp-nm{font-weight:600;font-size:15px;margin-bottom:1px}
  .pp-city{color:var(--text2);font-size:12px;margin-bottom:8px}
  .pp-row{margin:3px 0}.pp-row b{color:var(--text3);font-weight:600}
  .pp-tag{display:inline-block;font-size:10.5px;font-weight:600;color:#fff;padding:2px 8px;border-radius:6px;margin-bottom:7px}
  .leaflet-popup-content-wrapper{background:#fff;border-radius:14px;box-shadow:var(--shadow)}
  .leaflet-popup-content{margin:13px 15px;font-size:13px;line-height:1.5}
  .prov-label{font-weight:700;font-size:13px;white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff}
  .wrap{max-width:860px;margin:0 auto;padding:34px 22px 70px}
  h2{font-weight:700;letter-spacing:-.02em;margin:0 0 5px;font-size:28px}
  .lead{color:var(--text2);margin:0 0 26px;font-size:15px;line-height:1.5}
  .h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;margin:22px 0 12px}
  .tsum{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:0 0 6px}
  .tsum .box{background:var(--bg2);border-radius:16px;padding:16px 18px}
  .tsum .lab{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600}
  .tsum .val{font-size:16px;font-weight:600;margin-top:5px}
  .tsum .val small{font-size:13px;color:var(--text2);font-weight:400}
  .tl{padding-left:6px}
  .tleg{display:flex;gap:14px}
  .tleg .ic{flex:0 0 36px;display:flex;flex-direction:column;align-items:center}
  .tleg .badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:#fff;border:1.5px solid var(--hair);z-index:1}
  .tleg .badge.fl{border-color:var(--flight);color:var(--flight)}
  .tleg .badge.gr{border-color:var(--ground);color:var(--ground)}
  .tleg .line{width:2px;flex:1;background:var(--hair);margin:2px 0}
  .tleg:last-child .line{display:none}
  .tleg .bd{flex:1;padding-bottom:20px}
  .tleg .seg{font-weight:600;font-size:15px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .tleg .dur{font-weight:600;font-size:14px;white-space:nowrap}
  .tleg .tn{color:var(--text2);font-size:12.5px;margin-top:3px}
  .work{display:inline-block;margin-top:7px;font-size:12px;font-weight:600;color:#fff;background:var(--text);padding:3px 10px;border-radius:7px}
  .cav{background:var(--bg2);border-radius:16px;padding:6px 20px 8px}
  .cav li{font-size:13px;line-height:1.55;margin:11px 0}
  .day{border:1px solid var(--hair);border-radius:18px;margin:0 0 14px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)}
  .day-hd{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--bg2)}
  .day-hd .n{width:42px;height:42px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;color:#fff;line-height:1}
  .day-hd .n small{font-size:8px;font-weight:600;opacity:.85}
  .day-hd .rg{font-weight:600;font-size:16px}.day-hd .dt{color:var(--text2);font-size:12.5px;margin-top:1px}
  .movebadge{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;text-align:right}
  .movebadge b{font-size:13.5px;font-weight:600;color:var(--text)}
  .movebadge small{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .day-bd{padding:6px 18px 15px}
  .leg{display:flex;gap:14px;padding:11px 0;border-top:1px solid var(--hair2)}
  .leg:first-child{border-top:0}
  .leg .slot{flex:0 0 100px;color:var(--text3);font-size:12px;font-weight:600}
  .leg .who{font-weight:600;font-size:14.5px}.leg .buy{color:var(--text2);font-size:13px;margin-top:2px}
  .note{color:var(--text2);font-size:12.5px;margin-top:9px;line-height:1.5}
  .jtbl{width:100%;border-collapse:collapse;font-size:13px;margin:0 0 8px}
  .jtbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;padding:0 10px 8px;border-bottom:1px solid var(--hair)}
  .jtbl td{padding:10px;border-bottom:1px solid var(--hair2);vertical-align:top}.jtbl tr:last-child td{border-bottom:0}
  .jtbl td:first-child{font-weight:600}
  .jgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:0 0 10px}
  .jcard{background:var(--bg2);border-radius:16px;padding:16px 18px}
  .jcard h4{margin:0 0 8px;font-size:14px;font-weight:600}
  .jcard ul{margin:0;padding-left:17px}.jcard li{font-size:12.5px;margin:6px 0;line-height:1.5}
  .jcard .big{font-weight:600;font-size:14.5px;margin-top:3px}
  .intlgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0 0 12px}
  .seqrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 8px}
  .seqrow .s{background:var(--bg2);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600}
  .seqrow .a{color:var(--text3);font-weight:700}
  .rec{background:#eff6ee;border:1px solid #cfe6cf;border-radius:12px;padding:11px 15px;font-size:13px;line-height:1.5;margin:0 0 10px}
  @media(max-width:640px){#stops{display:none}#legend{max-width:170px}h2{font-size:23px}.intlgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="h-title">China trip — route &amp; airports</div>
  <div class="h-sub">Depart 24 Jul 2026 · Shanghai in, Guangzhou out · 4 provinces · flight-planning view</div>
</header>
<nav><div class="seg">
  <button class="active" data-view="map">Map</button>
  <button data-view="justin">Justin</button>
  <button data-view="travel">Travel</button>
  <button data-view="itinerary">Itinerary</button>
</div></nav>
<div id="content">
  <section id="view-map" class="view active">
    <div id="map"></div>
    <div class="toolbtn"><button id="fitChina">All China</button><button id="fitStops">Fit to route</button></div>

</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const LEGS=[
 {from:[31.143,121.805],to:[32.320,121.610],mode:'ground',label:'Shanghai PVG → Nantong (HSR ~1–1.5 h)'},
 {from:[32.320,121.610],to:[36.310,120.400],mode:'ground',label:'Nantong → Qingdao (direct HSR ~3.5–5 h)'},
 {from:[36.310,120.400],to:[37.668,116.805],mode:'ground',label:'Qingdao → Dezhou (HSR ~2–3 h)'},
 {from:[36.857,117.216],to:[24.544,118.127],mode:'flight',label:'Jinan TNA → Xiamen XMN (the big jump south)'},
 {from:[24.544,118.127],to:[24.570,117.850],mode:'ground',label:'Xiamen → Zhangzhou (1.5 h)'},
 {from:[24.544,118.127],to:[23.392,113.299],mode:'flight',label:'Xiamen XMN → Guangzhou CAN (~1.5 h, or 3–5 h rail)'},
 {from:[23.130,113.260],to:[22.860,113.260],mode:'ground',label:'Guangzhou → Foshan (45 min)'},

];
const TRAVEL={total:'≈ 31–33 h',entry:'Brisbane → Shanghai (direct)',exit:'Guangzhou → Brisbane (direct)',
 legs:[
  {seg:'Brisbane → Shanghai (PVG)',mode:'flight',dur:'~10h 30m',tn:'China Eastern, direct daily (per Justin).'},
  {seg:'Shanghai → Nantong',mode:'ground',dur:'~1–1.5 h',tn:'High-speed rail from Shanghai Hongqiao.',work:'Nantong'},
  {seg:'Nantong → Qingdao',mode:'ground',dur:'~3.5–5 h',tn:'Direct HSR (~7/day, fastest to Qingdao West). Take the train, skip Nantong’s small airport.',work:'Qingdao cluster'},
  {seg:'Qingdao → Dezhou',mode:'ground',dur:'~2–3 h',tn:'High-speed rail, both in Shandong.',work:'Dezhou / Ningjin'},
  {seg:'Jinan TNA → Xiamen (XMN)',mode:'flight',dur:'~2h 20m',tn:'Fly out of Jinan (near Dezhou) for the big jump south.',work:'Zhangzhou'},

 ],
 caveats:[

  '<b>Rail in the north.</b> Nantong→Qingdao→Dezhou are all high-speed rail — simpler than flying, no small-airport connections. Only the Dezhou→Xiamen jump is a flight (out of Jinan).',
  '<b>Visa-free.</b> Australians get 30 days visa-free entry to mainland China (through end-2026).',
 ]};

 legs:[
  {seg:'Shanghai → Nantong',mode:'rail',dur:'~1–1.5 h',tn:'High-speed rail, frequent from Shanghai Hongqiao. Easier than an airport transfer.'},
  {seg:'Nantong → Qingdao',mode:'rail',dur:'~3.5–5 h',tn:'Direct HSR, ~7/day, fastest ~3.5 h into Qingdao West. Take the train over connecting flights from Nantong’s small airport.'},

 ],
 airlines:[['China Southern','Best for Guangzhou-based travel'],['China Eastern','Strong Shanghai network'],['Air China','Reliable major carrier'],['Xiamen Air','Excellent around Fujian and Xiamen'],['Shenzhen Airlines','Reasonable secondary option']],
 budget:[['High-speed rail sectors','AUD 20–80 per leg'],['Domestic flights','AUD 150–400 per leg'],['Airport hotels','AUD 80–200 per night'],['Taxis & Didi','Generally cheap vs Australia']],
};

 {day:1,date:'Jul 24',region:'jiangsu',rg:'Arrive · Brisbane → Shanghai',move:'~11 h 45',
  legs:[['Daytime','Fly Brisbane → Shanghai (PVG)','China Eastern, direct daily (~10h30)'],['On arrival','HSR to Nantong','~1–1.5 h from Shanghai Hongqiao. Overnight Nantong.']],note:'Direct daily from Brisbane, so no date squeeze.'},
 {day:2,date:'Jul 25',region:'jiangsu',rg:'Jiangsu · Nantong',move:'~4 h',

 {day:3,date:'Jul 26',region:'shandong',rg:'Shandong · Qingdao',move:'~2.5 h',

 {day:4,date:'Jul 27',region:'shandong',rg:'Shandong · Ningjin',move:'~3 h 20',

 {day:5,date:'Jul 28',region:'fujian',rg:'Fujian · Zhangzhou',move:'~3 h',

 {day:6,date:'Jul 29',region:'guangdong',rg:'Guangdong',move:'~1 h 30',

const map=L.map('map',{zoomControl:true,minZoom:3}).setView([31,113],4);window.map=map;
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
const allPts=[],markerByCity={};
fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r=>r.json()).then(gj=>{
  const trip={};Object.values(REGIONS).forEach(r=>trip[r.adcode]=r);
  L.geoJSON(gj,{style:f=>{const t=trip[f.properties.adcode];return t?{color:t.color,weight:1.5,opacity:.95,fillColor:t.color,fillOpacity:.14}:{color:'#b9bcc4',weight:.6,opacity:.7,fillOpacity:0};},onEachFeature:(f,l)=>l.bindTooltip(f.properties.name,{sticky:true,direction:'top'})}).addTo(map).bringToBack();
  Object.values(REGIONS).forEach(r=>L.marker([r.center[1],r.center[0]],{interactive:false,icon:L.divIcon({html:`<div class="prov-label" style="color:${r.color}">${r.name}</div>`,iconSize:[120,18]})}).addTo(map));
}).catch(()=>{});
LEGS.forEach(s=>{const g=s.mode==='ground';L.polyline([s.from,s.to],{color:g?'#ff9500':'#0071e3',weight:g?3:2.6,opacity:.92,dashArray:g?null:'3,7'}).addTo(map).bindTooltip(s.label,{sticky:true});});
const planeSVG=c=>`<svg viewBox="0 0 24 24" width="20" height="20" fill="${c}" style="filter:drop-shadow(0 0 2px #fff) drop-shadow(0 1px 1px #fff)"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;
AIRPORTS.forEach(a=>{const html=`<div class="pp-nm">✈ ${a.code} — ${a.nm}</div><div class="pp-row"><b>Serves:</b> ${a.serves}</div>`;
  const m=L.marker(a.ll,{icon:L.divIcon({html:planeSVG('#0071e3'),iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map);
  m.bindTooltip(html,{direction:'top',offset:[0,-8],className:'rich-tip',sticky:false});m.bindPopup(html);allPts.push(a.ll);});
STOPS.forEach(s=>{const col=REGIONS[s.region].color,v=s.day>0;
  const icon=L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,14],html:`<div class="pin${v?'':' opt'}" style="background:${col}">${v?s.day:'+'}</div>`});
  const m=L.marker(s.ll,{icon}).addTo(map);
  const html=`<span class="pp-tag" style="background:${col}">${REGIONS[s.region].name}</span><div class="pp-nm">${s.city}</div><div class="pp-city">${v?'Day '+s.day:'Optional'} · ${s.kind}</div><div class="pp-row"><b>Nearest airport:</b> ${s.ap}</div><div class="pp-row"><b>Airport → site:</b> ${s.drive}</div><div class="pp-row"><b>Nearest HSR:</b> ${s.hsr}</div>`;
  m.bindTooltip(html,{direction:'top',offset:[0,-14],className:'rich-tip',sticky:false});m.bindPopup(html,{maxWidth:280});
  markerByCity[s.city]=m;allPts.push(s.ll);});
const b=L.latLngBounds(allPts).pad(.12);
document.getElementById('fitStops').onclick=()=>map.flyToBounds(b,{duration:.6});
document.getElementById('fitChina').onclick=()=>map.flyTo([31,110],4,{duration:.6});
let h='<h4>Route stops</h4>';STOPS.filter(s=>s.day>0).sort((a,b)=>a.day-b.day).forEach(s=>{const col=REGIONS[s.region].color;h+=`<div class="stop" data-c="${s.city}"><div class="daybadge" style="background:${col}"><small>DAY</small>${s.day}</div><div><div class="nm">${s.city}</div><div class="mt">${s.kind}</div><div class="ap">✈ ${s.ap}</div></div></div>`;});
document.getElementById('stops').innerHTML=h;
document.querySelectorAll('#stops .stop').forEach(el=>el.onclick=()=>{const m=markerByCity[el.dataset.c];map.flyTo(m.getLatLng(),9,{duration:.6});m.openPopup();});
document.getElementById('legend').innerHTML='<h4>Legend</h4>'+Object.values(REGIONS).map(r=>`<div class="lg"><span class="dot" style="background:${r.color}"></span>${r.name}</div>`).join('')+'<div class="lg"><span class="swatch" style="border-top-color:#ff9500"></span>Ground (rail / drive)</div><div class="lg"><span class="swatch" style="border-top-color:#0071e3;border-top-style:dashed"></span>Flight</div><div class="lg">✈ &nbsp;Airport</div>';

document.getElementById('travel').innerHTML='<h2>Optimal flight path</h2><p class="lead">Fly direct into Shanghai, high-speed rail up the coast through Shandong, fly the big jump south, exit Guangzhou direct to Brisbane.</p><div class="tsum">'+`<div class="box"><div class="lab">In transit</div><div class="val">${TRAVEL.total} <small>flying + rail</small></div></div><div class="box"><div class="lab">Entry</div><div class="val">${TRAVEL.entry}</div></div><div class="box"><div class="lab">Exit</div><div class="val">${TRAVEL.exit}</div></div>`+'</div><div class="h3">Leg by leg</div><div class="tl">'+TRAVEL.legs.map(l=>{const fl=l.mode==='flight';return `<div class="tleg"><div class="ic"><div class="badge ${fl?'fl':'gr'}">${fl?'✈':'🚄'}</div><div class="line"></div></div><div class="bd"><div class="seg">${l.seg}<span class="dur">${l.dur}</span></div><div class="tn">${l.tn}</div>${l.work?`<div class="work">Work · ${l.work}</div>`:''}</div></div>`;}).join('')+'</div><div class="h3">Notes</div><div class="cav"><ul style="padding-left:18px;margin:0">'+TRAVEL.caveats.map(c=>`<li>${c}</li>`).join('')+'</ul></div>';

document.getElementById('justin').innerHTML='<h2>Justin’s plan</h2><p class="lead">Route sanity-checked by Justin (pilot) and a contact working in China. His take on flights, connections and on-the-ground prep.</p><div class="h3">International flights</div><div class="intlgrid"><div class="jcard"><h4>✈ Into China</h4>Brisbane → Shanghai<div class="big">China Eastern · direct daily</div></div><div class="jcard"><h4>✈ Home</h4>Guangzhou → Brisbane<div class="big">China Southern · direct daily</div></div></div><div class="rec">Both run direct daily from Brisbane, so no backtracking. Cathay via Hong Kong is fine if a lot cheaper — but for three of you with luggage on a tight schedule, lean direct: HK adds a stop, a connection and a border crossing.</div><div class="h3">Recommended sequence</div><div class="seqrow">'+['Shanghai / Nantong','Qingdao','Dezhou','Xiamen / Zhangzhou','Guangzhou','Home'].map((s,i,a)=>`<span class="s">${s}</span>${i<a.length-1?'<span class="a">→</span>':''}`).join('')+'</div><div class="h3">Connections — rail vs flying</div><div class="tl">'+JUSTIN.legs.map(l=>{const fl=l.mode==='fly';return `<div class="tleg"><div class="ic"><div class="badge ${fl?'fl':'gr'}">${fl?'✈':'🚄'}</div><div class="line"></div></div><div class="bd"><div class="seg">${l.seg}<span class="dur">${l.dur}</span></div><div class="tn">${l.tn}</div></div></div>`;}).join('')+'</div><div class="h3">Domestic airlines</div><table class="jtbl"><thead><tr><th>Airline</th><th>Notes</th></tr></thead><tbody>'+JUSTIN.airlines.map(a=>`<tr><td>${a[0]}</td><td style="color:var(--text2)">${a[1]}</td></tr>`).join('')+'</tbody></table><div class="h3">Before you go</div><div class="jgrid"><div class="jcard"><h4>Payments</h4><ul><li>Install Alipay + WeChat</li><li>Link an Australian card to both</li><li>Mobile payment is easiest day-to-day; having both means no merchant catches you out</li></ul></div><div class="jcard"><h4>Data &amp; connectivity</h4><ul><li>Roaming or eSIM before departure</li><li>Check email, Teams, WhatsApp + business systems work before flying</li><li>Test before you leave, not on landing</li><li>VPN — NordVPN or ExpressVPN</li></ul></div><div class="jcard"><h4>Booking</h4><ul><li>Use Trip.com for rail — easy for foreigners, handles HSR, domestic flights + hotels in one place</li></ul></div></div><div class="h3">Budget guide (indicative)</div><table class="jtbl"><thead><tr><th>Item</th><th>Expected cost</th></tr></thead><tbody>'+JUSTIN.budget.map(x=>`<tr><td>${x[0]}</td><td>${x[1]}</td></tr>`).join('')+'</tbody></table><div class="cav"><ul style="padding-left:18px;margin:0"><li>Achievable but busy — Shanghai, Shandong, Fujian and Guangdong in six days. <b>Lock the factory appointments first, then build transport around them.</b></li><li>Justin is happy to sanity-check the bookings once dates are set against each factory.</li></ul></div>';

document.getElementById('itin').innerHTML='<h2>7-day plan</h2><p class="lead">Depart Brisbane 24 Jul 2026 (or 23rd for a buffer) · Shanghai in, Guangzhou out. "On the move" = flights + trains + airport drives that day.</p>'+ITIN.map(d=>{const col=REGIONS[d.region].color;return `<div class="day"><div class="day-hd"><div class="n" style="background:${col}"><small>DAY</small>${d.day}</div><div><div class="rg">${d.rg}</div><div class="dt">${d.date}</div></div><div class="movebadge"><b>${d.move}</b><small>on the move</small></div></div><div class="day-bd">${d.legs.map(l=>`<div class="leg"><div class="slot">${l[0]}</div><div><div class="who">${l[1]}</div>${l[2]?`<div class="buy">${l[2]}</div>`:''}</div></div>`).join('')}<div class="note">${d.note}</div></div></div>`;}).join('');

document.querySelectorAll('.seg button').forEach(bt=>bt.onclick=()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));bt.classList.add('active');document.getElementById('view-'+bt.dataset.view).classList.add('active');if(bt.dataset.view==='map')setTimeout(()=>map.invalidateSize(),60);});
</script>
</body>
</html>
