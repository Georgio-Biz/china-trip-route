<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>China Trip — Route &amp; Airports</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#fff;--bg2:#f5f5f7;--text:#1d1d1f;--text2:#6e6e73;--text3:#86868b;
    --hair:#d2d2d7;--hair2:#e8e8ed;--blue:#0071e3;--flight:#0071e3;--ground:#ff9500;
    --shandong:#2E6FD6;--jiangsu:#8A4FBE;--fujian:#CC7A1F;--guangdong:#3E8E2E;
    --shadow:0 4px 24px rgba(0,0,0,.10);--shadow-sm:0 1px 3px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{padding:13px 22px 11px;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hair)}
  .h-title{font-size:19px;font-weight:600;letter-spacing:-.012em}
  .h-sub{font-size:12.5px;color:var(--text2);margin-top:2px}
  nav{display:flex;justify-content:center;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--hair2)}
  .seg{display:inline-flex;background:var(--hair2);border-radius:10px;padding:3px;gap:2px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--text);padding:6px 18px;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .15s}
  .seg button.active{background:#fff;box-shadow:var(--shadow-sm);font-weight:600}
  #content{flex:1;min-height:0;position:relative}
  .view{position:absolute;inset:0;overflow:auto;display:none}
  .view.active{display:block}
  #map{position:absolute;inset:0;background:#eef1f4}
  .leaflet-container{background:#eef1f4;font-family:inherit}
  .panel{position:absolute;z-index:500;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);border:1px solid rgba(0,0,0,.06);border-radius:14px;box-shadow:var(--shadow)}
  #legend{left:14px;bottom:18px;padding:13px 15px;font-size:12px;max-width:230px}
  #legend h4{margin:0 0 9px;font-size:11px;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;font-weight:600}
  .lg{display:flex;align-items:center;gap:9px;margin:6px 0}
  .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .swatch{width:20px;height:0;border-top-width:3px;border-top-style:solid;flex:0 0 auto}
  #stops{right:14px;top:14px;width:250px;max-height:calc(100% - 28px);overflow:auto;padding:6px}
  #stops h4{margin:9px 11px 4px;font-size:11px;letter-spacing:.04em;color:var(--text3);text-transform:uppercase;font-weight:600}
  .stop{display:flex;gap:11px;padding:9px 11px;border-radius:11px;cursor:pointer;align-items:flex-start}
  .stop:hover{background:rgba(0,0,0,.045)}
  .daybadge{flex:0 0 auto;width:34px;height:34px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;line-height:1}
  .daybadge small{font-size:7.5px;font-weight:600;opacity:.85}
  .stop .nm{font-weight:600;font-size:13.5px}
  .stop .mt{font-size:11.5px;color:var(--text2);margin-top:2px}
  .stop .ap{font-size:11px;color:var(--blue);margin-top:3px}
  .toolbtn{position:absolute;z-index:500;left:14px;top:14px;display:flex;gap:7px}
  .toolbtn button{background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(18px);border:1px solid rgba(0,0,0,.06);color:var(--text);border-radius:10px;padding:8px 13px;font-size:12.5px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-sm)}
  .leaflet-popup-content-wrapper{background:#fff;border-radius:14px;box-shadow:var(--shadow)}
  .leaflet-popup-content{margin:13px 15px;font-size:13px;line-height:1.5}
  .pp-nm{font-weight:600;font-size:15px;margin-bottom:1px}
  .pp-city{color:var(--text2);font-size:12px;margin-bottom:8px}
  .pp-row{margin:3px 0}.pp-row b{color:var(--text3);font-weight:600}
  .pp-tag{display:inline-block;font-size:10.5px;font-weight:600;color:#fff;padding:2px 8px;border-radius:6px;margin-bottom:7px}
  .prov-label{font-weight:700;font-size:13px;white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff}
  .wrap{max-width:820px;margin:0 auto;padding:34px 22px 70px}
  h2{font-weight:700;letter-spacing:-.02em;margin:0 0 5px;font-size:28px}
  .lead{color:var(--text2);margin:0 0 26px;font-size:15px}
  .tsum{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:0 0 28px}
  .tsum .box{background:var(--bg2);border-radius:16px;padding:16px 18px}
  .tsum .lab{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600}
  .tsum .val{font-size:16px;font-weight:600;margin-top:5px}
  .tsum .val small{font-size:13px;color:var(--text2);font-weight:400}
  .h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;margin:6px 0 12px}
  .tl{padding-left:6px}
  .tleg{display:flex;gap:14px}
  .tleg .ic{flex:0 0 36px;display:flex;flex-direction:column;align-items:center}
  .tleg .badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:#fff;border:1.5px solid var(--hair);z-index:1}
  .tleg .badge.fl{border-color:var(--flight);color:var(--flight)}
  .tleg .badge.gr{border-color:var(--ground);color:var(--ground)}
  .tleg .line{width:2px;flex:1;background:var(--hair);margin:2px 0}
  .tleg:last-child .line{display:none}
  .tleg .bd{flex:1;padding-bottom:20px}
  .tleg .seg{font-weight:600;font-size:15px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .tleg .dur{font-weight:600;font-size:14px;white-space:nowrap}
  .tleg .tn{color:var(--text2);font-size:12.5px;margin-top:3px}
  .work{display:inline-block;margin-top:7px;font-size:12px;font-weight:600;color:#fff;background:var(--text);padding:3px 10px;border-radius:7px}
  .cav{background:var(--bg2);border-radius:16px;padding:6px 20px 8px}
  .cav li{font-size:13px;line-height:1.55;margin:11px 0}
  @media(max-width:640px){#stops{display:none}#legend{max-width:170px}h2{font-size:23px}}
</style>
</head>
<body>
<header>
  <div class="h-title">China trip — route &amp; airports</div>
  <div class="h-sub">Depart 24 Jul 2026 · Shanghai in, Guangzhou out · 4 provinces · flight-planning view</div>
</header>
<nav><div class="seg">
  <button class="active" data-view="map">Map</button>
  <button data-view="travel">Travel</button>
</div></nav>
<div id="content">
  <section id="view-map" class="view active">
    <div id="map"></div>
    <div class="toolbtn"><button id="fitChina">All China</button><button id="fitStops">Fit to route</button></div>
    <div id="stops" class="panel"></div>
    <div id="legend" class="panel"></div>
  </section>
  <section id="view-travel" class="view"><div class="wrap" id="travel"></div></section>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const REGIONS={
  shandong:{name:'Shandong 山东',color:'#2E6FD6',adcode:370000,center:[118.0,36.4]},
  jiangsu:{name:'Jiangsu 江苏',color:'#8A4FBE',adcode:320000,center:[119.8,33.0]},
  fujian:{name:'Fujian 福建',color:'#CC7A1F',adcode:350000,center:[118.0,26.1]},
  guangdong:{name:'Guangdong 广东',color:'#3E8E2E',adcode:440000,center:[113.4,23.4]},
};
// Generic stops — no supplier names (flight-planning view)
const STOPS=[
 {day:2,city:'Nantong (Rudong)',region:'jiangsu',ll:[32.32,121.61],kind:'Free weights',ap:'NTG · via Shanghai PVG (~1 h rail)',hsr:'Nantong West'},
 {day:3,city:'Qingdao',region:'shandong',ll:[36.31,120.40],kind:'Strength & cardio cluster (4 factories)',ap:'TAO Qingdao (~15–50 km)',hsr:'Qingdao North / Airport HSR'},
 {day:4,city:'Dezhou (Ningjin)',region:'shandong',ll:[37.66,116.79],kind:'Machines',ap:'TNA Jinan (~90 km)',hsr:'Dezhou East'},
 {day:0,city:'Yishui (Linyi)',region:'shandong',ll:[35.83,118.52],kind:'Flooring (optional)',ap:'LYI Linyi (~70 km)',hsr:'Yishui station'},
 {day:5,city:'Zhangzhou (Changtai)',region:'fujian',ll:[24.57,117.85],kind:'Racks',ap:'XMN Xiamen (~50 km)',hsr:'Xiamen North'},
 {day:6,city:'Guangzhou',region:'guangdong',ll:[23.13,113.26],kind:'Cardio',ap:'CAN Guangzhou (~28 km)',hsr:'Guangzhou South'},
 {day:6,city:'Foshan (Shunde)',region:'guangdong',ll:[22.86,113.26],kind:'Treadmills',ap:'CAN Guangzhou (~50 km)',hsr:'Guangzhou South'},
 {day:7,city:'Dongguan (Chashan)',region:'guangdong',ll:[23.07,113.95],kind:'Flooring',ap:'CAN (~65 km) / SZX Shenzhen',hsr:'Dongguan Station'},
];
const AIRPORTS=[
 {code:'PVG',nm:'Shanghai Pudong',ll:[31.143,121.805],serves:'Entry from Brisbane · gateway to Nantong + Qingdao'},
 {code:'NTG',nm:'Nantong Xingdong',ll:[32.071,120.976],serves:'Nantong — reach via Shanghai rail'},
 {code:'TAO',nm:'Qingdao Jiaodong',ll:[36.366,120.086],serves:'Qingdao cluster'},
 {code:'LYI',nm:'Linyi Qiyang',ll:[35.046,118.412],serves:'Optional Yishui stop (~70 km)'},
 {code:'TNA',nm:'Jinan Yaoqiang',ll:[36.857,117.216],serves:'Dezhou / Ningjin (~90 km)'},
 {code:'XMN',nm:'Xiamen Gaoqi',ll:[24.544,118.127],serves:'Zhangzhou (~50 km)'},
 {code:'CAN',nm:'Guangzhou Baiyun',ll:[23.392,113.299],serves:'Guangdong · direct flight home to Brisbane'},
];
const LEGS=[
 {from:[31.143,121.805],to:[32.320,121.610],mode:'ground',label:'Shanghai PVG → Nantong (rail ~1 h)'},
 {from:[31.143,121.805],to:[36.366,120.086],mode:'flight',label:'Shanghai → Qingdao TAO (~1h50)'},
 {from:[36.310,120.400],to:[37.668,116.805],mode:'ground',label:'Qingdao → Dezhou (HSR ~2 h)'},
 {from:[36.857,117.216],to:[24.544,118.127],mode:'flight',label:'Jinan TNA → Xiamen XMN (~2h20)'},
 {from:[24.544,118.127],to:[24.570,117.850],mode:'ground',label:'Xiamen → Zhangzhou (1.5 h)'},
 {from:[24.544,118.127],to:[23.392,113.299],mode:'flight',label:'Xiamen XMN → Guangzhou CAN (~1h40)'},
 {from:[23.130,113.260],to:[22.860,113.260],mode:'ground',label:'Guangzhou → Foshan (45 min)'},
 {from:[23.130,113.260],to:[23.070,113.950],mode:'ground',label:'Guangzhou → Dongguan (1 h)'},
];
const TRAVEL={total:'≈ 29–30 h',entry:'Brisbane → Shanghai → Qingdao',exit:'Guangzhou → Brisbane (direct)',
 legs:[
  {seg:'Brisbane → Shanghai (PVG)',mode:'flight',dur:'~10h 30m',tn:'China Eastern / Qantas, direct. ~4 flights/week — confirm a flight on the 23rd/24th, or use a daily Guangzhou entry as fallback.'},
  {seg:'Shanghai → Nantong',mode:'ground',dur:'~1h 00m',tn:'High-speed rail.',work:'Nantong'},
  {seg:'Shanghai → Qingdao (TAO)',mode:'flight',dur:'~1h 50m',tn:'~1 h back to Shanghai from Nantong first.',work:'Qingdao cluster'},
  {seg:'Qingdao → Dezhou',mode:'ground',dur:'~2h 00m',tn:'High-speed rail.',work:'Dezhou / Ningjin'},
  {seg:'Jinan TNA → Xiamen (XMN)',mode:'flight',dur:'~2h 20m',tn:'Drive Dezhou → Jinan (~1 h) first.',work:'Zhangzhou'},
  {seg:'Xiamen XMN → Guangzhou (CAN)',mode:'flight',dur:'~1h 40m',tn:'Multiple flights/day.',work:'Guangdong'},
  {seg:'Guangzhou CAN → Brisbane',mode:'flight',dur:'~9h 30m',tn:'China Southern, daily, direct.'},
 ],
 caveats:[
  '<b>Entry frequency.</b> Brisbane → Shanghai runs only ~4 flights/week. Confirm a flight on the 23rd or 24th, or fall back to a daily Brisbane → Guangzhou entry (which flips the trip south-to-north).',
  '<b>Visa-free.</b> Australians get 30 days visa-free entry to mainland China (through end-2026).',
  '<b>Exit.</b> Guangzhou → Brisbane direct is the clean finish; Hong Kong is an alternative (~1 h rail from Guangzhou, then Cathay).',
 ]};

const map=L.map('map',{zoomControl:true,minZoom:3}).setView([31,113],4);window.map=map;
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
const allPts=[],markerByCity={};
fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r=>r.json()).then(gj=>{
  const trip={};Object.values(REGIONS).forEach(r=>trip[r.adcode]=r);
  L.geoJSON(gj,{style:f=>{const t=trip[f.properties.adcode];return t?{color:t.color,weight:1.5,opacity:.95,fillColor:t.color,fillOpacity:.14}:{color:'#b9bcc4',weight:.6,opacity:.7,fillOpacity:0};},onEachFeature:(f,l)=>l.bindTooltip(f.properties.name,{sticky:true,direction:'top'})}).addTo(map).bringToBack();
  Object.values(REGIONS).forEach(r=>L.marker([r.center[1],r.center[0]],{interactive:false,icon:L.divIcon({html:`<div class="prov-label" style="color:${r.color}">${r.name}</div>`,iconSize:[120,18]})}).addTo(map));
}).catch(()=>{});
LEGS.forEach(s=>{const g=s.mode==='ground';L.polyline([s.from,s.to],{color:g?'#ff9500':'#0071e3',weight:g?3:2.6,opacity:.92,dashArray:g?null:'3,7'}).addTo(map).bindTooltip(s.label,{sticky:true});});
const planeSVG=c=>`<svg viewBox="0 0 24 24" width="20" height="20" fill="${c}" style="filter:drop-shadow(0 0 2px #fff) drop-shadow(0 1px 1px #fff)"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;
AIRPORTS.forEach(a=>{L.marker(a.ll,{icon:L.divIcon({html:planeSVG('#0071e3'),iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map).bindPopup(`<div class="pp-nm">✈ ${a.code} — ${a.nm}</div><div class="pp-row"><b>Serves:</b> ${a.serves}</div>`);allPts.push(a.ll);});
STOPS.forEach(s=>{const col=REGIONS[s.region].color,v=s.day>0;
  const m=L.circleMarker(s.ll,{radius:v?9:7,color:'#fff',weight:2,fillColor:col,fillOpacity:v?1:.5}).addTo(map);
  m.bindPopup(`<span class="pp-tag" style="background:${col}">${REGIONS[s.region].name}</span><div class="pp-nm">${s.city}</div><div class="pp-city">${v?'Day '+s.day:'Optional'} · ${s.kind}</div><div class="pp-row"><b>Airport:</b> ${s.ap}</div><div class="pp-row"><b>HSR:</b> ${s.hsr}</div>`,{maxWidth:280});
  if(v)m.bindTooltip(s.city,{direction:'top',offset:[0,-6]});markerByCity[s.city]=m;allPts.push(s.ll);});
const b=L.latLngBounds(allPts).pad(.12);
document.getElementById('fitStops').onclick=()=>map.flyToBounds(b,{duration:.6});
document.getElementById('fitChina').onclick=()=>map.flyTo([31,110],4,{duration:.6});
let h='<h4>Route stops</h4>';STOPS.filter(s=>s.day>0).sort((a,b)=>a.day-b.day).forEach(s=>{const col=REGIONS[s.region].color;h+=`<div class="stop" data-c="${s.city}"><div class="daybadge" style="background:${col}"><small>DAY</small>${s.day}</div><div><div class="nm">${s.city}</div><div class="mt">${s.kind}</div><div class="ap">✈ ${s.ap}</div></div></div>`;});
document.getElementById('stops').innerHTML=h;
document.querySelectorAll('#stops .stop').forEach(el=>el.onclick=()=>{const m=markerByCity[el.dataset.c];map.flyTo(m.getLatLng(),9,{duration:.6});m.openPopup();});
document.getElementById('legend').innerHTML='<h4>Legend</h4>'+Object.values(REGIONS).map(r=>`<div class="lg"><span class="dot" style="background:${r.color}"></span>${r.name}</div>`).join('')+'<div class="lg"><span class="swatch" style="border-top-color:#ff9500"></span>Ground (rail / drive)</div><div class="lg"><span class="swatch" style="border-top-color:#0071e3;border-top-style:dashed"></span>Flight</div><div class="lg">✈ &nbsp;Airport</div>';
document.getElementById('travel').innerHTML='<h2>Optimal flight path</h2><p class="lead">Enter mid-coast at Shanghai, sweep north to Shandong then south, exit Guangzhou direct to Brisbane.</p><div class="tsum">'+`<div class="box"><div class="lab">In transit</div><div class="val">${TRAVEL.total} <small>flying + rail</small></div></div><div class="box"><div class="lab">Entry</div><div class="val">${TRAVEL.entry}</div></div><div class="box"><div class="lab">Exit</div><div class="val">${TRAVEL.exit}</div></div>`+'</div><div class="h3">Leg by leg</div><div class="tl">'+TRAVEL.legs.map(l=>{const fl=l.mode==='flight';return `<div class="tleg"><div class="ic"><div class="badge ${fl?'fl':'gr'}">${fl?'✈':'🚄'}</div><div class="line"></div></div><div class="bd"><div class="seg">${l.seg}<span class="dur">${l.dur}</span></div><div class="tn">${l.tn}</div>${l.work?`<div class="work">Work · ${l.work}</div>`:''}</div></div>`;}).join('')+'</div><div class="h3">Notes</div><div class="cav"><ul style="padding-left:18px;margin:0">'+TRAVEL.caveats.map(c=>`<li>${c}</li>`).join('')+'</ul></div>';
document.querySelectorAll('.seg button').forEach(bt=>bt.onclick=()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));bt.classList.add('active');document.getElementById('view-'+bt.dataset.view).classList.add('active');if(bt.dataset.view==='map')setTimeout(()=>map.invalidateSize(),60);});
</script>
</body>
</html>
